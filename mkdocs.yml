# MkDocs Material config for the public Verdigris documentation site.
#
# The docs SOURCE lives here with the code (so it never drifts); only the
# RENDERED HTML in `site/` is published to GitHub Pages — the source stays
# private. Build:  mkdocs build      Preview:  mkdocs serve
# Publish:        mkdocs gh-deploy   (pushes built HTML to a gh-pages branch)
site_name: Verdigris
site_description: >-
  S3-native log storage & query engine in Rust — the layer your infrastructure
  leaves behind. A self-hostable log platform that keeps log data in your
  own cloud account.
site_url: https://explise.github.io/verdigris-docs/
docs_dir: docs
site_dir: site

# Code is private, so no source-repo link in the header. (Add repo_url later if
# you publish a public mirror.)

theme:
  name: material
  language: en
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  palette:
    # Light "warm paper" scheme; exact brand hues come from CSS overriding
    # --md-primary-fg-color / --md-accent-fg-color in stylesheets/extra.css.
    scheme: default
    primary: teal
    accent: teal
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: material/lock

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.snippets

# Don't fail the build on cross-links that point at repo files not in the site.
validation:
  links:
    absolute_links: ignore
    unrecognized_links: ignore

nav:
  - Home: index.md
  - Get started:
      - Quickstart: getting-started.md
      - Install on EKS: install.md
      - Sending logs: sending-logs.md
  - Using Verdigris:
      - Querying: querying.md
      - Cost & tiering: cost.md
      - Configuration: configuration.md
      - FAQ: faq.md
